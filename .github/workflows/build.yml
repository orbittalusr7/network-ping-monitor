name: Gerar Executável Windows 64-bits

on:
  push:
    tags:
      - 'v*' # Vai rodar toda vez que você criar uma tag de versão (ex: v1.0)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixando o código
      uses: actions/checkout@v4

    - name: Configurando Python 64-bits
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x64'

    - name: Instalando dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Se o seu script usa bibliotecas extras (ex: pillow), adicione aqui:
        # pip install pillow

    - name: Gerando o .exe com PyInstaller
      run: |
        pyinstaller --onefile --noconsole --icon=icone.ico -n "Monitor_de_Rede" monitor_rede.py

    - name: Criando a Release e subindo o arquivo
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Monitor_de_Rede.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
